<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFA 2026 Tracker</title>
<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --panel2:#0f172a;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --accent2:#38bdf8;
  --border:rgba(148,163,184,.16);
  --shadow:0 24px 60px rgba(2,6,23,.35)
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top, rgba(34,197,94,.12), transparent 30%), linear-gradient(180deg,#07111f 0%, var(--bg) 100%);
  color:var(--text)
}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
.hero{
  background:linear-gradient(180deg, rgba(17,24,39,.94), rgba(15,23,42,.88));
  border:1px solid var(--border);
  border-radius:26px;
  padding:24px;
  box-shadow:var(--shadow);
  display:grid;
  gap:12px;
  margin-bottom:20px
}
.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap
}
h1{
  margin:0;
  font-size:clamp(1.9rem,3vw,3rem);
  letter-spacing:-.03em
}
.sub{
  margin:0;
  color:var(--muted);
  line-height:1.6;
  max-width:76ch
}
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--text);
  font-size:.9rem
}
.grid{
  display:grid;
  grid-template-columns:340px minmax(0,1fr);
  gap:18px;
  align-items:start
}
@media(max-width:980px){
  .grid{grid-template-columns:1fr}
}
.panel{
  background:rgba(17,24,39,.92);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow);
  min-width:0
}
.panel h2{margin:0 0 14px;font-size:1.06rem}
.controls{display:grid;gap:12px}
input,select{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  outline:none
}
input::placeholder{color:#64748b}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px
}
@media(max-width:640px){.row{grid-template-columns:1fr}}
button{
  border:0;
  border-radius:12px;
  padding:12px 14px;
  font-weight:700;
  cursor:pointer;
  color:#04111a;
  background:linear-gradient(90deg,var(--accent),var(--accent2))
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px
}
@media(max-width:640px){.stats{grid-template-columns:1fr}}
.stat{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px
}
.stat .label{color:var(--muted);font-size:.84rem}
.stat .value{font-size:1.45rem;font-weight:800;margin-top:4px}
.livewrap{
  display:grid;
  gap:14px;
  min-width:0
}
.livebox{
  border:1px solid rgba(34,197,94,.25);
  background:linear-gradient(180deg, rgba(34,197,94,.12), rgba(17,24,39,.9));
  border-radius:20px;
  padding:18px;
  position:relative;
  overflow:hidden
}
.livebox::before{
  content:'';
  position:absolute;
  inset:-30%;
  background:radial-gradient(circle, rgba(34,197,94,.16) 0%, transparent 55%);
  animation:pulse 2s infinite
}
@keyframes pulse{
  0%{transform:scale(.92);opacity:.45}
  70%{transform:scale(1);opacity:1}
  100%{transform:scale(1.04);opacity:0}
}
.livekicker{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  position:relative;
  z-index:1
}
.livebadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(34,197,94,.16);
  color:#86efac;
  font-weight:800;
  font-size:.8rem
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 0 0 rgba(34,197,94,.65);
  animation:beat 1.5s infinite
}
@keyframes beat{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}
  70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}
.cards{display:grid;gap:14px}
.today-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:14px;
  margin-top:14px
}
.card{
  background:rgba(17,24,39,.88);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  min-width:0
}
.top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start
}
.title{
  font-weight:800;
  font-size:1.03rem;
  word-break:break-word
}
.meta{
  color:var(--muted);
  font-size:.92rem;
  margin-top:6px;
  line-height:1.5
}
.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:800
}
.sched{background:rgba(59,130,246,.14);color:#93c5fd}
.finished{background:rgba(34,197,94,.14);color:#86efac}
.live{background:rgba(239,68,68,.14);color:#fca5a5}
.teams{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
  margin:12px 0
}
.team{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  text-align:center;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis
}
.score2{text-align:center;min-width:90px}
.details{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  color:var(--muted);
  font-size:.92rem
}
@media(max-width:640px){.details{grid-template-columns:1fr}}
.empty{
  padding:26px;
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.03)
}
.team.winner{
  background:rgba(34,197,94,.18);
  border-color:rgba(34,197,94,.35);
  color:#86efac
}
.team.loser{
  background:rgba(239,68,68,.16);
  border-color:rgba(239,68,68,.30);
  color:#fca5a5
}
.team.neutral{background:rgba(255,255,255,.03)}
.stacked-controls{
  display:grid;
  gap:12px;
  width:100%
}
.filter-toggle{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px
}
.filter-panel{
  display:none;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border)
}
.filter-panel.open{display:block}
.chev{
  display:inline-block;
  transition:transform .2s ease
}
.filter-toggle[aria-expanded="true"] .chev{
  transform:rotate(180deg)
}
.group-shell{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border)
}
.group-table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:16px;
  border:1px solid var(--border);
  min-width:640px
}
.group-table th,
.group-table td{
  padding:10px 8px;
  text-align:left;
  border-bottom:1px solid rgba(148,163,184,.12);
  vertical-align:top;
  font-size:.88rem
}
.group-table th{
  background:rgba(255,255,255,.04);
  color:#cbd5e1;
  font-weight:700
}
.group-wrap{
  overflow:auto;
  border-radius:16px
}
.group-section{
  display:grid;
  gap:14px
}
.group-stage-title{
  margin:0 0 10px;
  font-size:1rem;
  color:#cbd5e1
}
@media(min-width:981px){
  .panel{
    position:sticky;
    top:24px;
  }
}
.api-error{
  padding:12px 16px;
  background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.3);
  border-radius:12px;
  color:#fca5a5;
  font-size:.9rem;
  margin-bottom:8px
}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="head">
      <h1>FIFA World Cup 2026 Tracker</h1>
      <div class="pill" id="stamp">Updated: —</div>
    </div>
    <div class="pills">
      <span class="pill">104 fixtures</span>
      <span class="pill">IST times</span>
      <span class="pill" id="liveStat">Live matches: 0</span>
      <span class="pill" id="apiStatus">⏳ Loading API…</span>
    </div>
    <div style="margin-top:12px;">
      <div id="sfcgfkg3ynxjju5k31g9klyusx5ysde5bjr"></div>
      <script type="text/javascript" src="https://counter11.optistats.ovh/private/counter.js?c=gfkg3ynxjju5k31g9klyusx5ysde5bjr&down=async" async></script>
      <noscript>
        <a href="https://www.freecounterstat.com" title="free web counters">
          <img src="https://counter11.optistats.ovh/private/freecounterstat.php?c=gfkg3ynxjju5k31g9klyusx5ysde5bjr" border="0" title="free web counters" alt="free web counters">
        </a>
      </noscript>
    </div>
  </section>

  <section class="grid">
    <aside class="panel">
      <div class="stacked-controls">
        <button class="filter-toggle" id="filterToggle" aria-expanded="false" aria-controls="filterPanel">
          <span>Filters</span><span class="chev">▾</span>
        </button>

        <div class="filter-panel" id="filterPanel">
          <div class="controls">
            <input id="searchInput" placeholder="Search team, match, venue…" />
            <div class="row">
              <select id="stageFilter">
                <option value="all">All stages</option>
                <option>Group Stage</option>
                <option>Round of 32</option>
                <option>Round of 16</option>
                <option>Quarterfinal</option>
                <option>Semifinal</option>
                <option>Third Place</option>
                <option>Final</option>
              </select>
              <select id="sortFilter">
                <option value="date">Sort by date</option>
                <option value="ist">Sort by IST</option>
              </select>
            </div>
            <div class="row">
              <select id="statusFilter">
                <option value="all">All statuses</option>
                <option value="scheduled">Scheduled</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
              </select>
              <select id="dateFilter"></select>
            </div>
            <button id="reloadBtn">🔄 Reload from API</button>
          </div>

          <div class="stats">
            <div class="stat"><div class="label">Visible</div><div class="value" id="visibleCount">0</div></div>
            <div class="stat"><div class="label">Live now</div><div class="value" id="liveCount">0</div></div>
            <div class="stat"><div class="label">Finished</div><div class="value" id="finishedCount">0</div></div>
          </div>
        </div>

        <button class="filter-toggle" id="groupToggle" aria-expanded="false" aria-controls="groupPanel">
          <span>Group-wise Table</span><span class="chev">▾</span>
        </button>

        <div class="filter-panel" id="groupPanel">
          <div id="groupSection"></div>
        </div>
      </div>
    </aside>

    <main class="livewrap">
      <section class="livebox" id="sameDayBox">
        <div class="livekicker">
          <div>
            <div class="livebadge"><span class="dot"></span><span>Today + Tomorrow</span></div>
            <div class="meta" id="sameDayMeta">Loading…</div>
          </div>
          <div class="pill" id="sameDayCount">0 matches</div>
        </div>
        <div id="todayGrid" class="today-grid"></div>
      </section>

      <section class="panel">
        <h2>Schedule</h2>
        <div id="matches" class="cards"></div>
      </section>
    </main>
  </section>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://worldcup26.ir';
// For local JSON fallback if API is down:
const FALLBACK_FIXTURES = './fixtures_clean.json';
const FALLBACK_GROUPS   = './groups.json';

// Stadium lookup (id → name) — built from API or static fallback
const STADIUM_MAP = {};
// Team lookup (id → name_en) — built from API
const TEAM_MAP = {};

let DATA   = [];  // normalised fixtures
let GROUPS = [];  // normalised group standings

// ─── TOKEN STORE ─────────────────────────────────────────────────────────────
// worldcup26.ir requires a JWT. We auto-register once per session and cache
// the token in sessionStorage so we never block re-renders.
const TOKEN_KEY = 'wc26_token';

async function getToken() {
  const cached = sessionStorage.getItem(TOKEN_KEY);
  if (cached) return cached;

  // Generate a throw-away guest account for read-only access
  const uid = Math.random().toString(36).slice(2, 10);
  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: `guest_${uid}`,
        email: `guest_${uid}@wc26.local`,
        password: `Pwd_${uid}_2026!`
      })
    });
    if (!res.ok) throw new Error('register failed');
    const { token } = await res.json();
    sessionStorage.setItem(TOKEN_KEY, token);
    return token;
  } catch {
    // If register fails (e.g. email taken), try login with same uid — won't
    // work, but we'll gracefully fall through to local JSON.
    return null;
  }
}

async function apiFetch(path) {
  const token = await getToken();
  if (!token) throw new Error('No token');
  const res = await fetch(`${API_BASE}${path}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!res.ok) throw new Error(`${res.status} ${path}`);
  return res.json();
}

// ─── TYPE → STAGE LABEL ──────────────────────────────────────────────────────
function typeToStage(type) {
  const map = {
    group: 'Group Stage',
    r32:   'Round of 32',
    r16:   'Round of 16',
    qf:    'Quarterfinal',
    sf:    'Semifinal',
    third: 'Third Place',
    final: 'Final'
  };
  return map[type] || 'Group Stage';
}

// Convert UTC/local_date string to IST display
function toIST(localDate) {
  if (!localDate) return '';
  // local_date format: "06/11/2026 13:00"  (local time at venue)
  // We'll treat it as UTC for a simple conversion; in production you'd
  // apply proper timezone offsets per stadium country.
  const [datePart, timePart] = localDate.split(' ');
  if (!datePart || !timePart) return localDate;
  const [month, day, year] = datePart.split('/');
  const d = new Date(`${year}-${month}-${day}T${timePart}:00Z`);
  if (isNaN(d)) return localDate;
  return d.toLocaleTimeString('en-IN', {
    hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata'
  }) + ' IST';
}

function toDateLabel(localDate) {
  if (!localDate) return '';
  const [datePart] = localDate.split(' ');
  const [month, day, year] = datePart.split('/');
  const d = new Date(`${year}-${month}-${day}T00:00:00Z`);
  return isNaN(d) ? localDate : d.toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric', timeZone: 'Asia/Kolkata'
  });
}

// ─── NORMALISE API MATCHES → internal DATA format ────────────────────────────
function normaliseMatches(apiMatches) {
  return apiMatches.map(m => {
    const home = TEAM_MAP[m.home_team_id] || m.home_team_label || `Team ${m.home_team_id}`;
    const away = TEAM_MAP[m.away_team_id] || m.away_team_label || `Team ${m.away_team_id}`;
    const stage = typeToStage(m.type);
    const dateLabel = toDateLabel(m.local_date);
    const ist  = toIST(m.local_date);
    const statusRaw = m.finished === 'TRUE' || m.finished === true ? 'finished' : 'scheduled';

    const homeGoals = (m.home_score != null && m.home_score !== '') ? Number(m.home_score) : null;
    const awayGoals = (m.away_score != null && m.away_score !== '') ? Number(m.away_score) : null;

    let team1Result = 0, team2Result = 0;
    if (statusRaw === 'finished' && homeGoals != null && awayGoals != null) {
      if (homeGoals > awayGoals) { team1Result = 1; team2Result = 2; }
      else if (awayGoals > homeGoals) { team1Result = 2; team2Result = 1; }
    }

    return {
      match:       `${home} vs ${away}`,
      team1:       home,
      team2:       away,
      homeGoals,
      awayGoals,
      team1Result,
      team2Result,
      stage,
      date:        dateLabel,
      ist,
      kickoff:     m.local_date ? m.local_date.split(' ')[1] : '',
      venue:       STADIUM_MAP[m.stadium_id] || `Stadium ${m.stadium_id}`,
      status:      statusRaw,
      _raw:        m
    };
  });
}

// ─── NORMALISE API GROUPS → internal GROUPS format ───────────────────────────
function normaliseGroups(apiGroups) {
  return apiGroups.map(g => ({
    group: `Group ${g.group}`,
    teams: (g.teams || []).map(t => ({
      team:          TEAM_MAP[t.team_id] || `Team ${t.team_id}`,
      played:        Number(t.mp  ?? t.played  ?? 0),
      wins:          Number(t.w   ?? t.wins    ?? 0),
      draws:         Number(t.d   ?? t.draws   ?? 0),
      losses:        Number(t.l   ?? t.losses  ?? 0),
      goalsFor:      Number(t.gf  ?? t.goalsFor      ?? 0),
      goalsAgainst:  Number(t.ga  ?? t.goalsAgainst  ?? 0),
      goalDifference:Number(t.gd  ?? t.goalDifference ?? 0),
      points:        Number(t.pts ?? t.points  ?? 0)
    }))
  }));
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
const E = {
  searchInput:   document.getElementById('searchInput'),
  stageFilter:   document.getElementById('stageFilter'),
  sortFilter:    document.getElementById('sortFilter'),
  statusFilter:  document.getElementById('statusFilter'),
  dateFilter:    document.getElementById('dateFilter'),
  reloadBtn:     document.getElementById('reloadBtn'),
  matches:       document.getElementById('matches'),
  visibleCount:  document.getElementById('visibleCount'),
  liveCount:     document.getElementById('liveCount'),
  finishedCount: document.getElementById('finishedCount'),
  stamp:         document.getElementById('stamp'),
  sameDayMeta:   document.getElementById('sameDayMeta'),
  sameDayCount:  document.getElementById('sameDayCount'),
  todayGrid:     document.getElementById('todayGrid'),
  liveStat:      document.getElementById('liveStat'),
  sameDayBox:    document.getElementById('sameDayBox'),
  filterToggle:  document.getElementById('filterToggle'),
  filterPanel:   document.getElementById('filterPanel'),
  groupToggle:   document.getElementById('groupToggle'),
  groupPanel:    document.getElementById('groupPanel'),
  groupSection:  document.getElementById('groupSection'),
  apiStatus:     document.getElementById('apiStatus')
};

function n(s){ return (s || '').toString().toLowerCase().replace(/\s+/g, ' ').trim(); }
function st(m){ return m.stage || 'Group Stage'; }
function ss(m){ return m.status || 'scheduled'; }
function score(m){ return (m.homeGoals != null && m.awayGoals != null) ? `${m.homeGoals} - ${m.awayGoals}` : 'vs'; }
function badge(s){
  return s === 'live'
    ? '<span class="badge live">LIVE</span>'
    : s === 'finished'
      ? '<span class="badge finished">FT</span>'
      : '<span class="badge sched">Scheduled</span>';
}
function dkey(d){ const t = new Date(d); return isNaN(t) ? d : t.getTime(); }
function ikey(i){ const m = /\(([^)]+)\)/.exec(i || ''); const t = new Date(m ? m[1] : i); return isNaN(t) ? i : t.getTime(); }
function teamClass(r){ return r === 1 ? 'winner' : r === 2 ? 'loser' : 'neutral'; }

function options(){
  const ds = ['all', ...new Set(DATA.map(x => x.date))];
  E.dateFilter.innerHTML = ds.map(d => `<option value="${d}">${d === 'all' ? 'All dates' : d}</option>`).join('');
}

function todayTomorrowMatches(){
  const now = new Date();
  const today = now.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  const t = new Date(now);
  t.setDate(now.getDate() + 1);
  const tomorrow = t.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  return DATA.filter(x => (x.date || '').includes(today) || (x.date || '').includes(tomorrow));
}

function renderToday(){
  let list = todayTomorrowMatches();
  if (!list.length) list = [...DATA].slice(0, 2);
  E.sameDayMeta.textContent = list.length
    ? `Showing ${list.length} match${list.length > 1 ? 'es' : ''} for today and tomorrow.`
    : 'No matches found.';
  E.sameDayCount.textContent = `${list.length} match${list.length !== 1 ? 'es' : ''}`;
  E.todayGrid.innerHTML = list.map(m => `
    <article class="card">
      <div class="top">
        <div>
          <div class="title">${m.match || ''}</div>
          <div class="meta">${st(m)} · ${m.date || ''}</div>
        </div>
        ${badge(ss(m))}
      </div>
      <div class="teams">
        <div class="team ${teamClass(m.team1Result)}"><strong>${m.team1 || ''}</strong></div>
        <div class="score2">
          <div style="font-size:1.45rem;font-weight:900">${score(m)}</div>
          <div class="meta">${m.ist || ''}</div>
        </div>
        <div class="team ${teamClass(m.team2Result)}"><strong>${m.team2 || ''}</strong></div>
      </div>
      <div class="details">
        <div><strong>Venue:</strong> ${m.venue || '—'}</div>
        <div><strong>Kickoff:</strong> ${m.kickoff || '—'}</div>
      </div>
    </article>
  `).join('');
}

function card(m){
  return `
    <article class="card">
      <div class="top">
        <div>
          <div class="title">${m.match || ''}</div>
          <div class="meta">${st(m)} · ${m.date || ''}</div>
        </div>
        ${badge(ss(m))}
      </div>
      <div class="teams">
        <div class="team ${teamClass(m.team1Result)}"><strong>${m.team1 || ''}</strong></div>
        <div class="score2">
          <div style="font-size:1.45rem;font-weight:900">${score(m)}</div>
          <div class="meta">${m.ist || ''}</div>
        </div>
        <div class="team ${teamClass(m.team2Result)}"><strong>${m.team2 || ''}</strong></div>
      </div>
      <div class="details">
        <div><strong>Venue:</strong> ${m.venue || '—'}</div>
        <div><strong>Kickoff:</strong> ${m.kickoff || '—'}</div>
        <div><strong>Stage:</strong> ${m.stage || '—'}</div>
      </div>
    </article>
  `;
}

function renderGroups(){
  E.groupSection.innerHTML = GROUPS.map(g => `
    <div>
      <h3 class="group-stage-title">${g.group}</h3>
      <div class="group-wrap">
        <table class="group-table">
          <thead>
            <tr>
              <th>Team</th><th>Pld</th><th>W</th><th>D</th><th>L</th>
              <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>
            ${(g.teams || []).map(t => `
              <tr>
                <td>${t.team || ''}</td>
                <td>${t.played ?? 0}</td>
                <td>${t.wins ?? 0}</td>
                <td>${t.draws ?? 0}</td>
                <td>${t.losses ?? 0}</td>
                <td>${t.goalsFor ?? 0}</td>
                <td>${t.goalsAgainst ?? 0}</td>
                <td>${t.goalDifference ?? 0}</td>
                <td>${t.points ?? 0}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `).join('');
}

function render(){
  const q     = n(E.searchInput.value);
  const stage = E.stageFilter.value;
  const stat  = E.statusFilter.value;
  const date  = E.dateFilter.value;
  const sort  = E.sortFilter.value;

  let L = [...DATA].filter(m => {
    const hay = n([m.match, m.venue, m.date, m.ist, m.team1, m.team2].join(' '));
    return (!q || hay.includes(q)) &&
      (stage === 'all' || st(m) === stage) &&
      (stat  === 'all' || ss(m) === stat)  &&
      (date  === 'all' || m.date === date);
  });

  if (sort === 'date') L.sort((a, b) => dkey(a.date) - dkey(b.date));
  else                 L.sort((a, b) => ikey(a.ist)  - ikey(b.ist));

  E.visibleCount.textContent  = L.length;
  E.liveCount.textContent     = DATA.filter(m => ss(m) === 'live').length;
  E.finishedCount.textContent = DATA.filter(m => ss(m) === 'finished').length;
  E.liveStat.textContent      = `Live matches: ${E.liveCount.textContent}`;

  E.matches.innerHTML = L.length
    ? L.map(card).join('')
    : '<div class="empty">No fixtures match the current filters.</div>';

  renderToday();
  renderGroups();
}

// ─── MAIN LOAD ────────────────────────────────────────────────────────────────
async function load(){
  E.apiStatus.textContent = '⏳ Loading API…';

  try {
    // 1. Fetch teams & stadiums first (needed to resolve IDs in matches/groups)
    const [teamsData, stadiumsData] = await Promise.all([
      apiFetch('/get/teams'),
      apiFetch('/get/stadiums')
    ]);

    // Build lookup maps
    (Array.isArray(teamsData) ? teamsData : teamsData.data || []).forEach(t => {
      TEAM_MAP[t.id] = t.name_en;
    });
    (Array.isArray(stadiumsData) ? stadiumsData : stadiumsData.data || []).forEach(s => {
      STADIUM_MAP[s.id] = s.name_en || s.fifa_name;
    });

    // 2. Fetch matches & groups
    const [matchesData, groupsData] = await Promise.all([
      apiFetch('/get/games'),
      apiFetch('/get/groups')
    ]);

    const rawMatches = Array.isArray(matchesData) ? matchesData : matchesData.data || [];
    const rawGroups  = Array.isArray(groupsData)  ? groupsData  : groupsData.data  || [];

    DATA   = normaliseMatches(rawMatches);
    GROUPS = normaliseGroups(rawGroups);

    E.apiStatus.textContent = '✅ Live API';
    E.stamp.textContent = 'Updated: ' + new Date().toLocaleString('en-IN');
    options();
    render();

  } catch (err) {
    console.warn('API failed, falling back to local JSON:', err);
    E.apiStatus.textContent = '⚠️ Offline (local data)';

    // Graceful fallback to your local JSON files
    try {
      const [fixturesRes, groupsRes] = await Promise.all([
        fetch(FALLBACK_FIXTURES, {cache:'no-store'}),
        fetch(FALLBACK_GROUPS,   {cache:'no-store'})
      ]);
      DATA   = await fixturesRes.json();
      GROUPS = await groupsRes.json();
      E.stamp.textContent = 'Updated: ' + new Date().toLocaleString('en-IN') + ' (local)';
      options();
      render();
    } catch (e2) {
      E.matches.innerHTML = `<div class="api-error">⚠️ Could not load data from API or local files. Check your connection.</div>`;
    }
  }
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
['input','change'].forEach(ev =>
  [E.searchInput, E.stageFilter, E.sortFilter, E.statusFilter, E.dateFilter]
    .forEach(el => el.addEventListener(ev, render))
);
E.reloadBtn.addEventListener('click', load);

E.filterToggle.addEventListener('click', () => {
  const open = E.filterPanel.classList.toggle('open');
  E.filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
});
E.groupToggle.addEventListener('click', () => {
  const open = E.groupPanel.classList.toggle('open');
  E.groupToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
});

// Auto-refresh every 90 seconds during a live match window
setInterval(() => {
  const liveCount = DATA.filter(m => m.status === 'live').length;
  if (liveCount > 0) load();
}, 90000);

load();
</script>
